name: FlashFly Deal Scanner

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run scanner
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.FLASHFLY_NETLIFY_SITE_ID }}
        run: node api/scanner.mjs

      - name: Commit updated deals
        run: |
          git config user.name "FlashFly Scanner"
          git config user.email "scanner@flashfly.app"
          git add site/deals.json
          git diff --staged --quiet || git commit -m "🔄 Scan $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
